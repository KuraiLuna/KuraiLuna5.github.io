<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SCHD 배당재투자계산기 <!-- — 설탕 버전--></title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <style>
    /* 설탕 스타일 */
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(150deg,#e3fef2,#d1f7e6);color:#065a4e;padding:20px}
    h1{text-align:center;margin-bottom:20px}
    .card{background:rgba(255,255,255,0.7);backdrop-filter:blur(8px);border:2px solid #9cdbd3;border-radius:16px;padding:20px;margin-bottom:20px}
    .btn{background:#65c4b0;color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:16px;cursor:pointer;transition:background .3s}
    .btn:hover{background:#4aa891}
    .flex{display:flex;gap:20px;flex-wrap:wrap}
    .flex>.card{flex:1 1 45%}
    .card.double{flex:1 1 100%}
    .form-group{display:flex;flex-direction:column;align-items:center;margin-bottom:16px}
    .form-group label{font-size:14px;margin-bottom:6px;text-align:center}
    .form-group input[type=number]{width:80%;padding:8px 12px;font-size:16px;border:1px solid #9cdbd3;border-radius:8px}
    .tax-group .tax-input,.freq-group .freq-input{display:flex;align-items:center;justify-content:center;gap:8px}
    .tax-group input[type=number],.freq-group input[type=number]{width:60px}
    .btn-group{display:flex;gap:6px}
    .tax-btn,.freq-btn{background:#fff;color:#065a4e;border:1px solid #9cdbd3;border-radius:8px;padding:6px 12px;cursor:pointer;transition:.2s}
    .tax-btn.selected,.freq-btn.selected{background:#65c4b0;color:#fff}
    #chart{width:100% !important;height:400px !important}
    table{width:100%;border-collapse:collapse;margin-top:20px}
    th,td{border:1px solid #9cdbd3;padding:8px;text-align:center;font-size:14px}
    th{background:#e3fcef}
    #input-summary p,#result-summary p{margin:8px 0;font-size:16px;font-weight:600;text-align:center}
    #error-msg{color:red;text-align:center;margin:10px 0;font-weight:bold}
  </style>
</head>
<body>
  <h1>🍃 SCHD 배당재투자계산기</h1>
 <p align="center"> SCHD 배당재투자로 복리의 놀라움을 느껴보세요 🚀</p>
<br>
  <div class="card">
    <div class="form-group"><label>초기 투자금 (만원)</label><input id="initial" type="number" value="100"></div>
    <div class="form-group"><label>월 매수금액 (만원)</label><input id="monthly" type="number" value="50"></div>
    <div class="form-group"><label>투자 기간 (년)</label><input id="years" type="number" value="10"></div>
    <div class="form-group"><label>시가 배당률 (%)</label><input id="divYield" type="number" value="3.5" step="0.1"></div>
    <div class="form-group"><label>배당 성장률 (%)</label><input id="divGrowth" type="number" value="12" step="0.1"></div>
    <div class="form-group"><label>주당 가격 (만원)</label><input id="price" type="number" value="4.0" step="0.1"></div>
    <div class="form-group"><label>주가 상승률 (%)</label><input id="priceGrowth" type="number" value="10" step="0.1"></div>
    <div class="form-group tax-group">
      <label>과세 비율</label>
      <div class="tax-input">
        <input id="taxRateInput" type="number" value="15.4" step="0.1"><span>%</span>
        <div class="btn-group">
          <button class="tax-btn selected" data-val="15.4">15.4%</button>
          <button class="tax-btn" data-val="0">0%</button>
        </div>
      </div>
    </div>
    <div class="form-group freq-group">
      <label>배당 주기</label>
      <div class="freq-input">
        <input id="freqCount" type="number" value="4" min="1"><span>회/년</span>
        <div class="btn-group">
          <button class="freq-btn" data-val="12">월</button>
          <button class="freq-btn selected" data-val="4">분기</button>
          <button class="freq-btn" data-val="1">연</button>
        </div>
      </div>
    </div>
    <div id="error-msg"></div>
    <div style="text-align:center;"><button class="btn" onclick="simulate()">계산하기</button></div>
  </div>

  <div class="flex">
    <div class="card" id="input-summary"></div>
    <div class="card" id="result-summary"></div>
  </div>

  <div class="card double">
    <canvas id="chart"></canvas>
    <table id="data-table">
      <thead><tr><th>연도</th><th>투자원금(만)</th><th>재투자금액(만)</th><th>배당금(만)</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    function fmtKRW(v){
      if(v>=1e12) return Math.floor(v/1e12)+'조';
      if(v>=1e8 ) return Math.floor(v/1e8)+'억';
      if(v>=1e4 ) return Math.floor(v/1e4)+'만';
      return Math.floor(v)+'원';
    }

    document.querySelectorAll('.tax-btn').forEach(b=>{
      b.onclick=()=>{
        document.querySelectorAll('.tax-btn').forEach(x=>x.classList.remove('selected'));
        b.classList.add('selected');
        document.getElementById('taxRateInput').value = b.dataset.val;
      };
    });
    document.getElementById('taxRateInput').oninput = ()=> document.querySelectorAll('.tax-btn').forEach(x=>x.classList.remove('selected'));
    document.querySelectorAll('.freq-btn').forEach(b=>{
      b.onclick=()=>{
        document.querySelectorAll('.freq-btn').forEach(x=>x.classList.remove('selected'));
        b.classList.add('selected');
        document.getElementById('freqCount').value = b.dataset.val;
      };
    });

    function simulate(){
      const initial     = +document.getElementById('initial').value * 10000;
      const monthly     = +document.getElementById('monthly').value * 10000;
      const years       = +document.getElementById('years').value;
      const divYield    = +document.getElementById('divYield').value / 100;
      const divGrowth   = +document.getElementById('divGrowth').value / 100;
      const priceStart  = +document.getElementById('price').value * 10000;
      const priceGrowth = +document.getElementById('priceGrowth').value / 100;
      const taxRate     = +document.getElementById('taxRateInput').value / 100;
      const freq        = +document.getElementById('freqCount').value;

      let shares = initial / priceStart;
      let price = priceStart;
      let divPS = priceStart * divYield;

      let grossAcc = 0;
      let netAcc = 0;

      const table = [];

      for (let y = 1; y <= years; y++) {
        price *= (1 + priceGrowth);
        divPS *= (1 + divGrowth);

        for (let m = 1; m <= 12; m++) {
          shares += monthly / price;
          if (m % (12 / freq) === 0) {
            const gross = Math.floor(shares * (divPS / freq));
            const net = Math.floor(gross * (1 - taxRate));
            grossAcc += gross;
            netAcc += net;
            shares += net / price;
          }
        }

        table.push({
          year: `${y}년`,
          principal: Math.floor((initial + monthly * 12 * y) / 10000),
          reinvest: Math.floor(netAcc / 10000),
          dividend: Math.floor(grossAcc / 10000)
        });
      }

      const last = table[table.length - 1];
      const totalValue = Math.floor(shares * price);
      const annualNet = Math.floor(shares * divPS * (1 - taxRate));
      const monthlyNet = Math.floor(annualNet / 12);

      document.getElementById('input-summary').innerHTML = `
        <p>초기투자금: ${fmtKRW(initial)}</p>
        <p>월 투자금: ${fmtKRW(monthly)}</p>
        <p>시가배당률: ${(divYield*100).toFixed(1)}%</p>
        <p>투자기간: ${years}년</p>
        <p>배당성장률: ${(divGrowth*100).toFixed(1)}%</p>
      `;
      document.getElementById('result-summary').innerHTML = `
        <p><strong>${years}년 뒤</strong></p>
        <p>총 투자금: ${fmtKRW(initial + monthly * 12 * years)}</p>
        <p>총 평가금액: ${fmtKRW(totalValue)}</p>
        <p style="color:#dc3545">월 배당금: ${fmtKRW(monthlyNet)}</p>
        <p style="color:#dc3545">연 배당금: ${fmtKRW(annualNet)}</p>
      `;

      const tbody = document.querySelector('#data-table tbody');
      tbody.innerHTML = table.map(row => `
        <tr><td>${row.year}</td><td>${row.principal}</td><td>${row.reinvest}</td><td>${row.dividend}</td></tr>
      `).join('');

      if (window.chartInst) chartInst.destroy();
      const ctx = document.getElementById('chart').getContext('2d');
      window.chartInst = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: table.map(r => r.year),
          datasets: [
            { label: '투자원금(만)', data: table.map(r => r.principal), backgroundColor: 'rgba(0,123,255,0.6)' },
            { label: '재투자금액(만)', data: table.map(r => r.reinvest), backgroundColor: 'rgba(40,167,69,0.6)' },
            { label: '배당금(만)', data: table.map(r => r.dividend), backgroundColor: 'rgba(220,53,69,0.6)' }
          ]
        },
        options: {
          responsive: true,
          scales: { y: { beginAtZero: true } }
        }
      });
    }
  </script>
